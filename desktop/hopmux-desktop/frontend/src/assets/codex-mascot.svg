<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Codex: a friendly rounded-square "terminal" bot -->
  <rect x="3.5" y="4.5" width="17" height="15" rx="5" fill="#2bb6c4"/>
  <!-- little antenna -->
  <rect x="11.35" y="1.8" width="1.3" height="2.6" rx="0.65" fill="#7fd6e0"/>
  <circle cx="12" cy="1.6" r="1.1" fill="#7fd6e0"/>
  <!-- screen face -->
  <rect x="6" y="7" width="12" height="9.5" rx="3" fill="#0e2f36"/>
  <!-- eyes -->
  <circle cx="9.5" cy="11" r="1.35" fill="#8be6f0"/>
  <circle cx="14.5" cy="11" r="1.35" fill="#8be6f0"/>
  <circle cx="9.9" cy="10.5" r="0.45" fill="#fff"/>
  <circle cx="14.9" cy="10.5" r="0.45" fill="#fff"/>
  <!-- prompt smile ">_" -->
  <path d="M9 13.8l1.4 1-1.4 1" stroke="#8be6f0" stroke-width="0.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <rect x="12.1" y="14.6" width="2.6" height="0.9" rx="0.45" fill="#8be6f0"/>
</svg>
